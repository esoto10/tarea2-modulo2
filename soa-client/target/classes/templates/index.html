<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Consulta de Empleados SOA</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous"/>
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
          rel="stylesheet"/>
    <style>
        body {
            background-color: #f0f2f5;
        }
        .card {
            border-radius: 0.75rem;
        }
        .card-header {
            border-radius: 0.75rem 0.75rem 0 0 !important;
        }
        .table th {
            width: 40%;
        }
        .badge-esb {
            font-size: 0.75rem;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-primary shadow-sm">
    <div class="container">
        <span class="navbar-brand fw-bold fs-5">
            <i class="bi bi-diagram-3-fill me-2"></i>Sistema SOA
        </span>
        <span class="badge bg-light text-primary badge-esb">
            <i class="bi bi-plug-fill me-1"></i>ESB: localhost:8082
        </span>
    </div>
</nav>

<!-- Main Content -->
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-6">

            <!-- Search Card -->
            <div class="card shadow">
                <div class="card-header bg-primary text-white py-3">
                    <h4 class="mb-0">
                        <i class="bi bi-person-badge-fill me-2"></i>Consulta de Empleados SOA
                    </h4>
                </div>
                <div class="card-body p-4">

                    <!-- Search Form -->
                    <form th:action="@{/}" method="get">
                        <label for="id" class="form-label fw-semibold text-secondary">
                            <i class="bi bi-hash me-1"></i>ID Empleado
                        </label>
                        <div class="input-group input-group-lg mb-3">
                            <span class="input-group-text bg-white">
                                <i class="bi bi-person-fill text-primary"></i>
                            </span>
                            <input type="number"
                                   id="id"
                                   name="id"
                                   class="form-control"
                                   placeholder="Ej: 1"
                                   th:value="${employeeId}"
                                   min="1"
                                   required/>
                            <button type="submit" class="btn btn-primary px-4">
                                <i class="bi bi-search me-1"></i>Consultar
                            </button>
                        </div>
                    </form>

                    <!-- Error Alert -->
                    <div th:if="${error}"
                         class="alert alert-danger d-flex align-items-center mt-2"
                         role="alert">
                        <i class="bi bi-exclamation-triangle-fill me-2 fs-5"></i>
                        <span th:text="${error}"></span>
                    </div>

                    <!-- Employee Profile Result -->
                    <div th:if="${profile}" class="mt-3">
                        <h6 class="text-primary fw-bold mb-3 border-bottom pb-2">
                            <i class="bi bi-person-check-fill me-2"></i>Perfil del Empleado
                        </h6>
                        <div class="table-responsive">
                            <table class="table table-bordered table-hover align-middle mb-0">
                                <tbody>
                                    <tr>
                                        <th class="table-primary">
                                            <i class="bi bi-person me-1"></i>Nombre
                                        </th>
                                        <td th:text="${profile.nombre}"></td>
                                    </tr>
                                    <tr>
                                        <th class="table-primary">
                                            <i class="bi bi-person me-1"></i>Apellido
                                        </th>
                                        <td th:text="${profile.apellido}"></td>
                                    </tr>
                                    <tr>
                                        <th class="table-primary">
                                            <i class="bi bi-briefcase me-1"></i>Cargo
                                        </th>
                                        <td th:text="${profile.cargo}"></td>
                                    </tr>
                                    <tr>
                                        <th class="table-primary">
                                            <i class="bi bi-building me-1"></i>Departamento
                                        </th>
                                        <td th:text="${profile.departamento}"></td>
                                    </tr>
                                    <tr>
                                        <th class="table-primary">
                                            <i class="bi bi-cash-coin me-1"></i>Salario PEN
                                        </th>
                                        <td>
                                            <span class="fw-bold text-success">
                                                S/&nbsp;<span th:text="${#numbers.formatDecimal(profile.salarioPEN, 1, 'COMMA', 2, 'POINT')}"></span>
                                            </span>
                                        </td>
                                    </tr>
                                    <tr>
                                        <th class="table-primary">
                                            <i class="bi bi-arrow-left-right me-1"></i>Tipo de Cambio
                                        </th>
                                        <td th:text="${#numbers.formatDecimal(profile.tipoCambio, 1, 'COMMA', 4, 'POINT')}"></td>
                                    </tr>
                                    <tr>
                                        <th class="table-primary">
                                            <i class="bi bi-currency-dollar me-1"></i>Salario USD
                                        </th>
                                        <td>
                                            <span class="fw-bold text-success">
                                                $&nbsp;<span th:text="${#numbers.formatDecimal(profile.salarioUSD, 1, 'COMMA', 2, 'POINT')}"></span>
                                            </span>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>

                </div>

                <!-- Card Footer -->
                <div class="card-footer text-muted text-center small bg-white">
                    <i class="bi bi-shield-check me-1 text-primary"></i>
                    Datos obtenidos vía ESB &mdash;
                    <code>http://localhost:8082/soa/employee-profile/{id}</code>
                </div>
            </div>

        </div>
    </div>
</div>

<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmftmhEFKtpoAHiZfRvFKK/x07K9"
        crossorigin="anonymous"></script>
</body>
</html>
