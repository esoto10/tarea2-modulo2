services:

  # ── Servicios de negocio ────────────────────────────────────────────────────

  employee-service:
    build: ./employee-service
    container_name: employee-service
    ports:
      - "8082:8082"
    networks:
      - soa-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  department-service:
    build: ./department-service
    container_name: department-service
    ports:
      - "8083:8083"
    networks:
      - soa-network

  exchange-service:
    build: ./exchange-service
    container_name: exchange-service
    ports:
      - "8091:8091"
    networks:
      - soa-network

  # ── ESB ─────────────────────────────────────────────────────────────────────

  camel-esb-service:
    build: ./camel-esb-service
    container_name: camel-esb-service
    ports:
      - "8092:8092"
    environment:
      # Apunta a los nombres de servicio Docker en lugar de localhost
      - SERVICES_EMPLOYEE_URL=http://employee-service:8082
      - SERVICES_DEPARTMENT_URL=http://department-service:8083
      - SERVICES_EXCHANGE_URL=http://exchange-service:8091
    depends_on:
      employee-service:
        condition: service_healthy
      department-service:
        condition: service_started
      exchange-service:
        condition: service_started
    networks:
      - soa-network

  # ── Cliente web ──────────────────────────────────────────────────────────────

  soa-client:
    build: ./soa-client
    container_name: soa-client
    ports:
      - "8084:8084"
    environment:
      # El cliente solo conoce el ESB
      - ESB_BASE_URL=http://camel-esb-service:8092
    depends_on:
      - camel-esb-service
    networks:
      - soa-network

networks:
  soa-network:
    driver: bridge
